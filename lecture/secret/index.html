<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Area | 課題別解説・解答</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030a16;
            --accent: #f59e0b;
            --panel: rgba(15, 23, 42, 0.8);
            --border: rgba(234, 179, 8, 0.3);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            padding: 60px 20px;
            text-align: center;
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 50px; }

        .kadai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }
        .kadai-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .kadai-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(234, 179, 8, 0.1);
        }
        .kadai-card .status-icon { font-size: 2rem; margin-bottom: 15px; display: block; }
        .kadai-card h3 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }
        .kadai-card p { margin: 0; font-size: 0.85rem; color: #94a3b8; }

        /* Modal / Gate */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(3, 10, 22, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin: 20px 0;
            box-sizing: border-box;
            text-align: center;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
        }

        /* Detail View */
        #detailView {
            display: none;
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 60px;
            text-align: left;
        }
        .back-btn {
            background: none; border: 1px solid #475569; color: #94a3b8;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 30px;
        }

        .back-portal {
            position: absolute; top: 30px; left: 30px;
            color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-portal">← Portal</a>

    <div class="container" id="mainGrid">
        <h1>Answer Area</h1>
        <p class="subtitle">各課題の解説を閲覧するには、講義で配布された個別のパスワードが必要です。</p>

        <div class="kadai-grid">
            <div class="kadai-card" onclick="openGate(1)">
                <span class="status-icon">🔒</span>
                <h3>課題 1</h3>
                <p>基本構造・変数・演算</p>
            </div>
            <div class="kadai-card" onclick="openGate(2)">
                <span class="status-icon">🔒</span>
                <h3>課題 2</h3>
                <p>制御構文・ループ</p>
            </div>
            <div class="kadai-card" onclick="openGate(3)">
                <span class="status-icon">🔒</span>
                <h3>課題 3</h3>
                <p>配列・関数</p>
            </div>
            <div class="kadai-card" onclick="openGate(4)">
                <span class="status-icon">🔒</span>
                <h3>課題 4</h3>
                <p>構造体・ファイル入出力</p>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">課題 1</h2>
            <p>この解説を閲覧するためのパスワードを入力してください。</p>
            <input type="password" id="pwInput" placeholder="Enter Password">
            <button class="modal-btn" onclick="checkPassword()">Unlock</button>
            <button class="modal-btn" onclick="closeGate()" style="background:none; color:#94a3b8; margin-top:10px;">Cancel</button>
            <div id="errMsg" style="color:#ef4444; margin-top:10px; font-size:0.8rem;"></div>
        </div>
    </div>

    <!-- Detail Display -->
    <div class="container" id="detailView">
        <button class="back-btn" onclick="showGrid()">← 一覧に戻る</button>
        <div id="detailContent"></div>
    </div>

    <script>
        // 各課題ごとのパスワード（個別に設定可能）
        const PASSWORDS = {
            1: "aB7xR9m2",
            2: "kP4tW5nQ",
            3: "vE2sY8zG",
            4: "hJ9cM6dL"
        };

        let activeKadai = null;

        function openGate(n) {
            activeKadai = n;
            document.getElementById('modalTitle').textContent = `課題 ${n} の解説`;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
            document.getElementById('errMsg').textContent = '';
        }

        function closeGate() {
            document.getElementById('modal').style.display = 'none';
        }

        function checkPassword() {
            const input = document.getElementById('pwInput').value;
            if (input === PASSWORDS[activeKadai]) {
                closeGate();
                loadContent(activeKadai);
            } else {
                document.getElementById('errMsg').textContent = "パスワードが正しくありません。";
            }
        }

        function loadContent(n) {
            const detailView = document.getElementById('detailView');
            const mainGrid = document.getElementById('mainGrid');
            const content = document.getElementById('detailContent');

            // 仮のコンテンツ生成
            content.innerHTML = `
                <h2 style="color:var(--accent); font-size:2rem; margin-bottom:10px;">課題 ${n}：解説・解答例</h2>
                <hr style="border:0; border-top:1px solid var(--border); margin-bottom:30px;">
                <p style="line-height:1.8;">
                    ここでは課題 ${n} の詳細なロジック解説と、標準的な解答例コードを確認できます。<br>
                    特に注意すべきポイントや、よくあるエラーについてもまとめています。
                </p>
                <div style="background:#0f172a; padding:25px; border-radius:16px; font-family:monospace; margin-top:30px; border:1px solid var(--border); line-height:1.5;">
                    <span style="color:#94a3b8;">// 課題 ${n} 解答例</span><br>
                    <span style="color:#3b82f6;">#include</span> &lt;stdio.h&gt;<br><br>
                    <span style="color:#3b82f6;">int</span> main(<span style="color:#3b82f6;">void</span>) {<br>
                    &nbsp;&nbsp;<span style="color:#94a3b8;">/* 実装の詳細は講義資料を参照してください */</span><br>
                    &nbsp;&nbsp;printf(<span style="color:#22d3ee;">"Hello Kadai ${n}\\n"</span>);<br>
                    &nbsp;&nbsp;<span style="color:#3b82f6;">return</span> <span style="color:#f59e0b;">0</span>;<br>
                    }
                </div>
            `;

            mainGrid.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0,0);
        }

        function showGrid() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'block';
        }

        document.getElementById('pwInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
