<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Area | 課題別解説・解答</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030a16;
            --accent: #f59e0b;
            --panel: rgba(15, 23, 42, 0.8);
            --border: rgba(234, 179, 8, 0.3);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            padding: 60px 20px;
            text-align: center;
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 50px; }

        .kadai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }
        .kadai-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .kadai-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(234, 179, 8, 0.1);
        }
        .kadai-card .status-icon { font-size: 2rem; margin-bottom: 15px; display: block; }
        .kadai-card h3 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }
        .kadai-card p { margin: 0; font-size: 0.85rem; color: #94a3b8; }

        /* Modal / Gate */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(3, 10, 22, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin: 20px 0;
            box-sizing: border-box;
            text-align: center;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
        }

        /* Content Styling */
        .content-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .content-header .badge { background: var(--accent); color: var(--bg); padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; margin-bottom: 10px; display: inline-block; }
        .content-header h2 { font-size: 2.2rem; margin: 0; font-family: 'Outfit', sans-serif; }
        
        .explanation-section { margin-bottom: 50px; }
        .explanation-section h3 { font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .logic-box { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .logic-box ul { padding-left: 20px; margin: 0; }
        .logic-box li { margin-bottom: 12px; color: #cbd5e1; line-height: 1.6; }

        .code-wrapper { background: #010409; border: 1px solid var(--border); border-radius: 16px; padding: 20px; overflow-x: auto; }
        .code-wrapper pre { margin: 0; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.5; color: #e6edf3; }
        
        .action-footer { margin-top: 60px; padding: 30px; background: rgba(234, 179, 8, 0.05); border-radius: 16px; text-align: center; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-portal">← Portal</a>

    <div class="container" id="mainGrid">
        <h1>Answer Area</h1>
        <p class="subtitle">各課題の解説を閲覧するには、講義で配布された個別のパスワードが必要です。</p>

        <div class="kadai-grid">
            <div class="kadai-card" onclick="openGate(1)">
                <span class="status-icon">🔒</span>
                <h3>課題 1</h3>
                <p>基本構造・変数・演算</p>
            </div>
            <div class="kadai-card" onclick="openGate(2)">
                <span class="status-icon">🔒</span>
                <h3>課題 2</h3>
                <p>制御構文・ループ</p>
            </div>
            <div class="kadai-card" onclick="openGate(3)">
                <span class="status-icon">🔒</span>
                <h3>課題 3</h3>
                <p>配列・関数</p>
            </div>
            <div class="kadai-card" onclick="openGate(4)">
                <span class="status-icon">🔒</span>
                <h3>課題 4</h3>
                <p>構造体・ファイル入出力</p>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">課題 1</h2>
            <p>この解説を閲覧するためのパスワードを入力してください。</p>
            <input type="password" id="pwInput" placeholder="Enter Password">
            <button class="modal-btn" onclick="checkPassword()">Unlock</button>
            <button class="modal-btn" onclick="closeGate()" style="background:none; color:#94a3b8; margin-top:10px;">Cancel</button>
            <div id="errMsg" style="color:#ef4444; margin-top:10px; font-size:0.8rem;"></div>
        </div>
    </div>

    <!-- Detail Display -->
    <div class="container" id="detailView">
        <button class="back-btn" onclick="showGrid()">← 一覧に戻る</button>
        <div id="detailContent"></div>
    </div>

    <script>
        // 各課題ごとのパスワード
        const PASSWORDS = {
            1: "aB7xR9m2",
            2: "kP4tW5nQ",
            3: "vE2sY8zG",
            4: "hJ9cM6dL"
        };

        let activeKadai = null;

        function openGate(n) {
            activeKadai = n;
            document.getElementById('modalTitle').textContent = `課題 ${n} の解説`;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
            document.getElementById('errMsg').textContent = '';
        }

        function closeGate() {
            document.getElementById('modal').style.display = 'none';
        }

        function checkPassword() {
            const input = document.getElementById('pwInput').value;
            if (input === PASSWORDS[activeKadai]) {
                closeGate();
                loadContent(activeKadai);
            } else {
                document.getElementById('errMsg').textContent = "パスワードが正しくありません。";
            }
        }

        function loadContent(n) {
            const detailView = document.getElementById('detailView');
            const mainGrid = document.getElementById('mainGrid');
            const content = document.getElementById('detailContent');

            const kadaiTitles = {
                1: "基本構造・変数・演算",
                2: "制御構文・ループ",
                3: "配列・関数",
                4: "構造体・ファイル入出力"
            };

            content.innerHTML = `
                <div class="content-header">
                    <span class="badge">ASSIGNMENT ${n}</span>
                    <h2>課題 ${n}：${kadaiTitles[n]}</h2>
                </div>
                
                <section class="explanation-section">
                    <h3>💡 アルゴリズムの要点</h3>
                    <div class="logic-box">
                        <p>この課題を解く上で、特に意識すべきポイントです：</p>
                        <ul>
                            <li>${n===1 ? '変数の型（int, double）と、それぞれの出力形式（%d, %f）の使い分け。' : n===2 ? 'for文による指定回数の反復と、if文による条件分岐の組み合わせ。' : n===3 ? '配列によるデータの集約管理と、関数へのポインタ/配列渡し。' : '構造体による関連データのパッケージ化と、ファイルポインタによる読み書き。'}</li>
                            <li>${n===1 ? '演算子の優先順位と、整数の除算における小数点以下の切り捨て。' : n===2 ? 'ループの終了条件（継続条件）の設計ミスによる無限ループの防止。' : n===3 ? '関数の戻り値（return）を効果的に使ったメイン処理の簡素化。' : 'fopen/fcloseの確実な実行と、データのフォーマット（fprintf/fscanf）の不一致防止。'}</li>
                        </ul>
                    </div>
                </section>

                <section class="explanation-section">
                    <h3>✅ 解答例（サンプルコード）</h3>
                    <p>以下は、この課題の要点を押さえた標準的な解答例です。</p>
                    <div class="code-wrapper">
                        <pre><code>${getSampleCodePlaceholder(n)}</code></pre>
                    </div>
                </section>

                <div class="action-footer">
                    <p>さらに詳しく学びたい場合は、授業スライドの「解説パート」や、ポータルの「Knowledge Review」も併せて活用してください。</p>
                </div>
            `;

            mainGrid.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0,0);
        }

        function getSampleCodePlaceholder(n) {
            if (n === 1) return '#include <stdio.h>\n\nint main(void) {\n    int a = 10, b = 3;\n    printf("合計: %d\\n", a + b);\n    printf("平均: %.2f\\n", (double)a / b);\n    return 0;\n}';
            if (n === 2) return '#include <stdio.h>\n\nint main(void) {\n    for(int i = 1; i <= 10; i++) {\n        if(i % 2 == 0) printf("%d は偶数です\\n", i);\n    }\n    return 0;\n}';
            if (n === 3) return '#include <stdio.h>\n\nvoid printArray(int arr[], int size) {\n    for(int i = 0; i < size; i++) printf("%d ", arr[i]);\n}\n\nint main(void) {\n    int data[] = {1, 2, 3, 4, 5};\n    printArray(data, 5);\n    return 0;\n}';
            return '#include <stdio.h>\n\ntypedef struct {\n    char name[20];\n    int score;\n} Student;\n\nint main(void) {\n    Student s = {"Taro", 85};\n    FILE *fp = fopen("result.txt", "w");\n    fprintf(fp, "%s, %d\\n", s.name, s.score);\n    fclose(fp);\n    return 0;\n}';
        }

        function showGrid() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'block';
        }

        document.getElementById('pwInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
