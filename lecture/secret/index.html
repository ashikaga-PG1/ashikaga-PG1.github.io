<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Area | 課題別解説・解答</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030a16;
            --accent: #f59e0b;
            --panel: rgba(15, 23, 42, 0.8);
            --border: rgba(234, 179, 8, 0.3);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            padding: 60px 20px;
            text-align: center;
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 50px; }

        .kadai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }
        .kadai-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .kadai-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(234, 179, 8, 0.1);
        }
        .kadai-card .status-icon { font-size: 2rem; margin-bottom: 15px; display: block; pointer-events: none; }
        .kadai-card h3 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); pointer-events: none; }
        .kadai-card p { margin: 0; font-size: 0.85rem; color: #94a3b8; pointer-events: none; }

        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(3, 10, 22, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin: 20px 0;
            box-sizing: border-box;
            text-align: center;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
        }

        #detailView { display: none; text-align: left; }
        .back-btn {
            background: none; border: 1px solid var(--border); color: var(--accent);
            padding: 8px 16px; border-radius: 99px; cursor: pointer;
            margin-bottom: 20px; transition: 0.2s;
        }
        .back-btn:hover { background: rgba(234, 179, 8, 0.1); }
        
        .content-header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .badge { background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        
        .explanation-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        @media (max-width: 900px) { .explanation-grid { grid-template-columns: 1fr; } }

        .explanation-section h3 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; color: var(--accent); margin-top: 0; margin-bottom: 15px; }
        .logic-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .logic-box ul { padding-left: 20px; margin: 0; }
        .logic-box li { margin-bottom: 10px; color: #cbd5e1; }

        .code-wrapper {
            background: #010409;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow-x: auto;
            position: relative;
        }
        .code-wrapper pre { margin: 0; font-family: 'Consolas', monospace; font-size: 0.9rem; line-height: 1.5; color: #e2e8f0; }

        .action-footer {
            margin-top: 60px;
            padding: 30px;
            background: rgba(234, 179, 8, 0.05);
            border-radius: 16px;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .back-portal {
            position: fixed; top: 20px; left: 20px; color: var(--text); text-decoration: none; font-size: 0.9rem; opacity: 0.6; z-index: 10;
        }
    </style>
    <script>
        // ---------------------------------------------------------
        // UI Logic (Defined early to avoid ReferenceError)
        // ---------------------------------------------------------
        let activeKadai = null;
        let lastSuccessPassword = "";

        function openGate(n) {
            console.log("UI: Opening gate for", n);
            activeKadai = n;
            const modal = document.getElementById('modal');
            if (modal) {
                document.getElementById('modalTitle').textContent = "課題 " + n + " の解説";
                modal.style.display = 'flex';
                document.getElementById('pwInput').value = '';
                document.getElementById('pwInput').focus();
                document.getElementById('errMsg').textContent = '';
            }
        }

        function closeGate() {
            document.getElementById('modal').style.display = 'none';
        }

        function showGrid() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'block';
        }
    </script>
</head>
<body>
    <a href="../../index.html" class="back-portal">← Portal</a>

    <div class="container" id="mainGrid">
        <h1>Answer Area</h1>
        <p class="subtitle">各課題の解説を閲覧するには、講義で配布された個別のパスワードが必要です。</p>

        <div class="kadai-grid">
            <div class="kadai-card" onclick="openGate(1)">
                <span class="status-icon">🔒</span>
                <h3>課題 1</h3>
                <p>基本構造・変数・演算</p>
            </div>
            <div class="kadai-card" onclick="openGate(2)">
                <span class="status-icon">🔒</span>
                <h3>課題 2</h3>
                <p>制御構文・ループ</p>
            </div>
            <div class="kadai-card" onclick="openGate(3)">
                <span class="status-icon">🔒</span>
                <h3>課題 3</h3>
                <p>配列・関数</p>
            </div>
            <div class="kadai-card" onclick="openGate(4)">
                <span class="status-icon">🔒</span>
                <h3>課題 4</h3>
                <p>構造体・ファイル入出力</p>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">課題 1</h2>
            <p>この解説を閲覧するためのパスワードを入力してください。</p>
            <input type="password" id="pwInput" placeholder="Enter Password">
            <button class="modal-btn" onclick="checkPassword()">Unlock</button>
            <button class="modal-btn" onclick="closeGate()" style="background:none; color:#94a3b8; margin-top:10px; border:none; cursor:pointer;">Cancel</button>
            <div id="errMsg" style="color:#ef4444; margin-top:10px; font-size:0.8rem;"></div>
        </div>
    </div>

    <!-- Detail Display -->
    <div class="container" id="detailView">
        <button class="back-btn" onclick="showGrid()">← 一覧に戻る</button>
        <div id="detailContent"></div>
    </div>

        async function checkPassword() {
            const input = document.getElementById('pwInput').value;
            const msg = document.getElementById('errMsg');
            if (!input) return;
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(input);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                if (hashHex === KEY_HASHES[activeKadai]) {
                    lastSuccessPassword = input;
                    closeGate();
                    loadContent(activeKadai);
                } else {
                    msg.textContent = "パスワードが正しくありません。";
                }
            } catch (e) {
                console.error(e);
                msg.textContent = "エラーが発生しました。";
            }
        }

        const decrypt = (key, b64) => {
            try {
                const k = key.split('').map(c => c.charCodeAt(0));
                const s = atob(b64.replace(/\s/g, '')).split('').map(c => c.charCodeAt(0));
                const res = s.map((c, i) => c ^ k[i % k.length]);
                const decoded = String.fromCharCode(...res);
                return decodeURIComponent(escape(decoded));
            } catch(e) { 
                console.error("Decrypt Error:", e);
                return "復号に失敗しました。"; 
            }
        };

        function loadContent(n) {
            const detailView = document.getElementById('detailView');
            const mainGrid = document.getElementById('mainGrid');
            const content = document.getElementById('detailContent');
            const encrypted = ENCRYPTED_CONTENT[n];
            if(!encrypted) return;

            const decPoints = decrypt(lastSuccessPassword, encrypted.points);
            const decCode = decrypt(lastSuccessPassword, encrypted.code);
            let points = [];
            try { points = JSON.parse(decPoints); } catch(e) { console.error("JSON Error", e); }

            const titles = { 1: "基本構造", 2: "配列の活用", 3: "関数とポインタ", 4: "ファイル入出力" };
            const images = {
                1: "../webapp/assets/img/session04/circuit.png",
                2: "../webapp/assets/img/session07/parallel_circuit.png",
                3: "../webapp/assets/img/session11/circuit.png",
                4: "../webapp/assets/img/session14/slide01.png"
            };

            content.innerHTML = `
                <div class="content-header">
                    <span class="badge">ASSIGNMENT ${n} EXPLANATION</span>
                    <h2>${titles[n]}</h2>
                </div>
                <div class="explanation-grid">
                    <section class="explanation-section">
                        <h3>📖 資料スライド</h3>
                        <div class="slide-preview"><img src="${images[n]}" style="max-width:100%; border-radius:12px;" onerror="this.src='https://placehold.co/600x400?text=Slide+Image'"></div>
                    </section>
                    <section class="explanation-section">
                        <h3>💡 アルゴリズムの要点</h3>
                        <div class="logic-box"><ul>${points.map(p => `<li>${p}</li>`).join('')}</ul></div>
                    </section>
                </div>
                <section class="explanation-section">
                    <h3>✅ 完成解答例</h3>
                    <div class="code-wrapper"><pre><code>${decCode}</code></pre></div>
                </section>
            `;
            mainGrid.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0,0);
        }

        document.getElementById('pwInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
