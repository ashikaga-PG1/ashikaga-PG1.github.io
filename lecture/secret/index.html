<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Area | 課題別解説・解答</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030a16;
            --accent: #f59e0b;
            --panel: rgba(15, 23, 42, 0.8);
            --border: rgba(234, 179, 8, 0.3);
            --text: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            padding: 60px 20px;
            text-align: center;
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 50px; }

        .kadai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }
        .kadai-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .kadai-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(234, 179, 8, 0.1);
        }
        .kadai-card .status-icon { font-size: 2rem; margin-bottom: 15px; display: block; }
        .kadai-card h3 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }
        .kadai-card p { margin: 0; font-size: 0.85rem; color: #94a3b8; }

        /* Modal / Gate */
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(3, 10, 22, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin: 20px 0;
            box-sizing: border-box;
            text-align: center;
        }
        .modal-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
        }

        /* Content Styling */
        .content-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .content-header .badge { background: var(--accent); color: var(--bg); padding: 4px 12px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; margin-bottom: 10px; display: inline-block; }
        .content-header h2 { font-size: 2.2rem; margin: 0; font-family: 'Outfit', sans-serif; }
        
        .explanation-section { margin-bottom: 50px; }
        /* Explanation Detail View */
        #detailView { display: none; text-align: left; }
        .back-btn {
            background: none; border: 1px solid var(--border); color: var(--accent);
            padding: 8px 16px; border-radius: 99px; cursor: pointer;
            margin-bottom: 20px; transition: 0.2s;
        }
        .back-btn:hover { background: rgba(234, 179, 8, 0.1); }
        
        .content-header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .badge { background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        
        .explanation-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        @media (max-width: 900px) { .explanation-grid { grid-template-columns: 1fr; } }

        .explanation-section h3 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; color: var(--accent); margin-top: 0; margin-bottom: 15px; }
        .logic-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .logic-box ul { padding-left: 20px; margin: 0; }
        .logic-box li { margin-bottom: 10px; color: #cbd5e1; }

        .code-wrapper {
            background: #010409;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow-x: auto;
            position: relative;
        }
        .code-wrapper pre { margin: 0; font-family: 'Consolas', monospace; font-size: 0.9rem; line-height: 1.5; color: #e2e8f0; }

        .action-footer {
            margin-top: 60px;
            padding: 30px;
            background: rgba(234, 179, 8, 0.05);
            border-radius: 16px;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-portal">← Portal</a>

    <div class="container" id="mainGrid">
        <h1>Answer Area</h1>
        <p class="subtitle">各課題の解説を閲覧するには、講義で配布された個別のパスワードが必要です。</p>

        <div class="kadai-grid">
            <div class="kadai-card" onclick="openGate(1)">
                <span class="status-icon">🔒</span>
                <h3>課題 1</h3>
                <p>基本構造・変数・演算</p>
            </div>
            <div class="kadai-card" onclick="openGate(2)">
                <span class="status-icon">🔒</span>
                <h3>課題 2</h3>
                <p>制御構文・ループ</p>
            </div>
            <div class="kadai-card" onclick="openGate(3)">
                <span class="status-icon">🔒</span>
                <h3>課題 3</h3>
                <p>配列・関数</p>
            </div>
            <div class="kadai-card" onclick="openGate(4)">
                <span class="status-icon">🔒</span>
                <h3>課題 4</h3>
                <p>構造体・ファイル入出力</p>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">課題 1</h2>
            <p>この解説を閲覧するためのパスワードを入力してください。</p>
            <input type="password" id="pwInput" placeholder="Enter Password">
            <button class="modal-btn" onclick="checkPassword()">Unlock</button>
            <button class="modal-btn" onclick="closeGate()" style="background:none; color:#94a3b8; margin-top:10px;">Cancel</button>
            <div id="errMsg" style="color:#ef4444; margin-top:10px; font-size:0.8rem;"></div>
        </div>
    </div>

    <!-- Detail Display -->
    <div class="container" id="detailView">
        <button class="back-btn" onclick="showGrid()">← 一覧に戻る</button>
        <div id="detailContent"></div>
    </div>

    <script>
        // 各課題ごとのパスワードハッシュ (SHA-256)
        const KEY_HASHES = {
            1: "d274a4bf930e9b414a4a3ce75d13c646523b2860b04a9a2b01a6cae7a16a3d5d",
            2: "551d7a62902ad18dd415f780fb5b4b2108ba73770518a3700afa4d01763cbee9",
            3: "0044b1adbe7f2176f148f3bca662f489eac1d52adfdebd69f28fab3ea700d4c8",
            4: "916347f83491c4b2a178294fe5fbebfe4809d7224af772457c2a4e48380c6eec"
        };

        let activeKadai = null;

        function openGate(n) {
            activeKadai = n;
            document.getElementById('modalTitle').textContent = `課題 ${n} の解説`;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
            document.getElementById('errMsg').textContent = '';
        }

        function closeGate() {
            document.getElementById('modal').style.display = 'none';
        }

        async function checkPassword() {
            const input = document.getElementById('pwInput').value;
            const msg = document.getElementById('errMsg');
            
            // SHA-256 ハッシュ生成
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === KEY_HASHES[activeKadai]) {
                closeGate();
                loadContent(activeKadai);
            } else {
                msg.textContent = "パスワードが正しくありません。";
            }
        }

        // 簡易的な難読化（Base64）
        const utoa = (str) => btoa(unescape(encodeURIComponent(str)));
        const atou = (str) => decodeURIComponent(escape(atob(str)));

        function loadContent(n) {
            const detailView = document.getElementById('detailView');
            const mainGrid = document.getElementById('mainGrid');
            const content = document.getElementById('detailContent');

            const kadaiData = {
                1: {
                    title: "電気回路とプログラミング1：基本構造",
                    points: [
                        "オームの法則 I = V / R の計算実装",
                        "for文を用いた抵抗値の変化（5～50[Ω]）の繰り返し処理",
                        "if文による許容電流 Imax=0.60[A] の判定",
                        "条件を満たした回数（okCount）のインクリメント"
                    ],
                    img: "../webapp/assets/img/session04/circuit.png"
                },
                2: {
                    title: "電気回路とプログラミング2：配列の活用",
                    points: [
                        "抵抗値を配列 int R[5] = {5, 10, 15, 20, 25} で定義",
                        "計算結果を格納する配列 double I[5] の利用",
                        "ループ内での配列要素へのアクセス（R[k], I[k]）",
                        "集計変数 okCount による処理結果の管理"
                    ],
                    img: "../webapp/assets/img/session07/parallel_circuit.png"
                },
                3: {
                    title: "電気回路とプログラミング3：関数とポインタ",
                    points: [
                        "電流計算を独立した関数 calcI(V, R) として定義",
                        "ポインタ（&I, *outI）を用いた関数の結果受け取り",
                        "複数の入力リスト（V_list, R_list）の同時ループ処理",
                        "maxValue/minValue関数による統計情報の抽出"
                    ],
                    img: "../webapp/assets/img/session11/circuit.png"
                },
                4: {
                    title: "電気回路とプログラミング4：ファイル入出力",
                    points: [
                        "構造体 Stats によるデータパッケージング",
                        "fopen / fclose によるファイルの確実な制御",
                        "fscanf を用いた data.txt からの継続的データ読み込み",
                        "fprintf による result.txt への計算結果出力"
                    ],
                    img: "../webapp/assets/img/session14/slide01.png"
                }
            };

            const data = kadaiData[n];

            content.innerHTML = `
                <div class="content-header">
                    <span class="badge">ASSIGNMENT ${n} EXPLANATION</span>
                    <h2>${data.title}</h2>
                </div>

                <div class="explanation-grid">
                    <section class="explanation-section">
                        <h3>📖 資料スライド</h3>
                        <div class="slide-preview">
                            <img src="${data.img}" alt="Lecture Slide" style="max-width:100%; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                        </div>
                    </section>
                    
                    <section class="explanation-section">
                        <h3>💡 アルゴリズムの要点</h3>
                        <div class="logic-box">
                            <ul>
                                ${data.points.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    </section>
                </div>

                <section class="explanation-section">
                    <h3>✅ 完成解答例</h3>
                    <p>TODO箇所を埋めた完成版のコードです。構成とロジックを確認してください。</p>
                    <div class="code-wrapper">
                        <pre><code>${getSampleCodePlaceholder(n)}</code></pre>
                    </div>
                </section>

                <div class="action-footer">
                    <p>この解答は一つの正解例です。変数名や構造が異なっていても、仕様を満たしていれば正解となります。</p>
                </div>
            `;

            mainGrid.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0,0);
        }

        function getSampleCodePlaceholder(n) {
            // ここではソースコードの直読を避けるため、Base64で難読化して保持する運用も可能です
            // 今回はハッシュ化により「パスワード自体の漏洩」を防ぐことを優先しました
            const codes = {
1: `#include <stdio.h>

int main(void){
  const double V = 5.0;      // 電圧[V]
  const double Imax = 0.60;  // 許容電流[A]

  int okCount = 0;           // OKの件数

  printf("V=%.1fV  Imax=%.2fA\\n", V, Imax);
  printf("-------------------------\\n");
  printf("R(ohm)   I(A)    judge\\n");
  printf("-------------------------\\n");

  for(int k = 1; k <= 10; k++){
    int R = 5 * k;              // 5,10,15,...,50

    // TODO1: オームの法則で電流Iを計算
    double I = V / R;

    // TODO2: 判定して表示（WARN/OK）
    if( I > Imax ){
      printf("%5d  %6.3f   WARN\\n", R, I);
    }else{
      printf("%5d  %6.3f   OK\\n", R, I);
      okCount++;
    }
  }

  printf("-------------------------\\n");
  printf("OK=%d / 10\\n", okCount);

  return 0;
}`,
2: `#include <stdio.h>

int main(void){
  const double V = 5.0;      // 電圧[V]
  const double Imax = 0.60;  // 許容電流[A]

  // TODO1: 配列の定義をする
  int R[5] = {5, 10, 15, 20, 25};   // 抵抗[Ω]
  double I[5];                      // 電流[A]（計算結果）
  int okCount = 0;

  // TODO2: 配列Iに電流を計算して格納
  for(int k = 0; k < 5; k++){
    I[k] = V / R[k];
  }

  // TODO3: 一覧表示＋OK件数の集計（ifで判定）
  printf("V=%.1fV  Imax=%.2fA\\n", V, Imax);
  printf("-------------------------\\n");
  printf("k  R(ohm)   I(A)    judge\\n");
  printf("-------------------------\\n");

  for(int k = 0; k < 5; k++){
    if(I[k] > Imax){
      printf("%d %5d  %6.3f   WARN\\n", k, R[k], I[k]);
    }else{
      printf("%d %5d  %6.3f   OK\\n", k, R[k], I[k]);
      okCount = okCount + 1;
    }
  }

  printf("-------------------------\\n");
  printf("OK=%d / 5\\n", okCount);

  return 0;
}`,
3: `#include <stdio.h>

// 計算専用
double calcI(double V, double R){
  return V / R;
}

// 入力チェック込み（成功:1 / 失敗:0）
int calcI_checked(double V, double R, double *outI){
  if(R <= 0) return 0;
  *outI = calcI(V, R);
  return 1;
}

// TODO1-1: 新しいmaxを返す
double maxValue(double a, double b){
  if(a > b) return a;
  return b;
}

// TODO1-2: 新しいminを返す
double minValue(double a, double b){
  if(a < b) return a;
  return b;
}

int main(void){
  double V_list[] = {5.0, 5.0, 5.0, 12.0, 9.0};
  double R_list[] = {5.0, 10.0, 0.0, 6.0, 3.0};
  int N = (int)(sizeof(V_list) / sizeof(V_list[0]));

  double sumI = 0.0;
  int validCount = 0;
  double maxI = 0.0;
  double minI = 0.0;

  for(int k = 0; k < N; k++){
    double V = V_list[k];
    double R = R_list[k];
    double I;

    printf("case %d: V=%.1f R=%.1f -> ", k + 1, V, R);

    if(!calcI_checked(V, R, &I)){
      printf("R error\\n");
      continue;
    }

    printf("I=%.3f\\n", I);

    sumI += I;
    if(validCount == 0){
      maxI = I;
      minI = I;
    }else{
      maxI = maxValue(maxI, I);
      minI = minValue(minI, I);
    }
    validCount++;
  }

  if(validCount > 0){
    printf("avg=%.3f\\n", sumI / validCount);
    printf("max=%.3f\\n", maxI);
    printf("min=%.3f\\n", minI);
  }else{
    printf("avg=NA\\n");
    printf("max=NA\\n");
    printf("min=NA\\n");
  }

  return 0;
}`,
4: `#include <stdio.h>

typedef struct {
  double sumI;
  int valid;
} Stats;

// TODO1-1: 入力ファイルを開く
FILE *openInputFile(const char *name){
  FILE *fin = fopen(name, "r");
  return fin;
}

// TODO1-2: 出力ファイルを開く
FILE *openOutputFile(const char *name){
  FILE *fout = fopen(name, "w");
  return fout;
}

// 読み込み → 処理 → 書き込み
Stats processAndWrite(FILE *fin, FILE *fout){
  Stats st = {0.0, 0};
  double V, R;

  while(fscanf(fin, "%lf %lf", &V, &R) == 2){
    if(R <= 0){
      printf("skip (R error)\\n");
      continue;
    }
    double I = V / R;
    fprintf(fout, "%.3f\\n", I);
    printf("I=%.3f (write)\\n", I);
    st.sumI += I;
    st.valid++;
  }
  return st;
}

void printSummary(Stats st){
  if(st.valid > 0) printf("avg=%.3f\\n", st.sumI / st.valid);
  else          printf("avg=NA\\n");
}

int main(void){
  const char *inName = "data.txt";
  const char *outName = "result.txt";

  FILE *fin = openInputFile(inName);
  if(fin == NULL){
    printf("open error: %s\\n", inName);
    return 0;
  }

  FILE *fout = openOutputFile(outName);
  if(fout == NULL){
    printf("open error: %s\\n", outName);
    fclose(fin);
    return 0;
  }

  Stats st = processAndWrite(fin, fout);

  fclose(fin);
  fclose(fout);

  printSummary(st);

  return 0;
}`
            };
            return codes[n] || "// No code available";
        }

        function showGrid() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('mainGrid').style.display = 'block';
        }

        document.getElementById('pwInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
